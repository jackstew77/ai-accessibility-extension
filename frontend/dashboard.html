<!DOCTYPE html>
<html>
<head>
<title>Teacher Classroom Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 🔝 TOP BAR */
.topbar{
background:#2c6ecb;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:600;
}

/* container */
.container{
padding:30px;
max-width:1000px;
margin:auto;
}

/* cards */
.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
transition:0.2s;
}

.card:hover{
transform:translateY(-2px);
}

/* inputs */
input,select{
padding:10px;
margin:8px 0;
width:100%;
border-radius:8px;
border:1px solid #ddd;
}

/* buttons */
button{
background:#2c6ecb;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

button:hover{
background:#1f55a5;
}

/* small buttons */
button.small{
padding:6px 10px;
font-size:12px;
margin-right:5px;
}

button.delete{
background:#e74c3c;
}

button.delete:hover{
background:#c0392b;
}

/* table */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#f0f4ff;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

/* grid */
.mode-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
margin-bottom:20px;
}

.mode-grid label{
display:flex;
align-items:center;
gap:8px;
}

.mode-grid input[type="checkbox"]{
width:16px;
height:16px;
}

.custom-section{
margin-top:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* modal */
.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
width:420px;
z-index:1000;
}

<h1>Teacher Classroom Dashboard</h1>

<div class="card">
<h3>Create Classroom</h3>
<input id="className" placeholder="Class Name">

<label>Locked Lexile</label>
<select id="lexile">
<option value="">No Locked Lexile</option>
<option value="early">Early</option>
<option value="elementary">Elementary</option>
<option value="middle">Middle</option>
<option value="high">High</option>
<option value="advanced">Advanced</option>
</select>

<h4>Allowed AI Tools</h4>

<div class="mode-grid">
<label><input type="checkbox" value="simplify" checked> Simplify</label>
<label><input type="checkbox" value="study_guide"> Study Guide</label>
<label><input type="checkbox" value="quiz"> Quiz</label>
<label><input type="checkbox" value="vocabulary"> Vocabulary</label>
<label><input type="checkbox" value="discussion"> Discussion</label>
<label><input type="checkbox" value="cornell"> Cornell Notes</label>
<label><input type="checkbox" value="summarize"> Summarize</label>
<label><input type="checkbox" value="explain"> Explain</label>
<label><input type="checkbox" value="translate"> Translate</label>
<label><input type="checkbox" value="read"> Read Aloud</label>
</div>

<div class="custom-section">
<label class="custom-label">
<input type="checkbox" id="allowCustom">
Allow Custom Prompts
</label>
<button onclick="createClass()">Create Classroom</button>
</div>
</div>

<div class="card">
<h3>Your Classrooms</h3>
<button onclick="loadClasses()">Refresh Classrooms</button>
<table id="classTable"></table>
</div>

<div id="editModal" class="modal">
<h3>Edit Classroom</h3>

<label>Locked Lexile</label>
<select id="editLexile">
<option value="">No Locked Lexile</option>
<option value="early">Early</option>
<option value="elementary">Elementary</option>
<option value="middle">Middle</option>
<option value="high">High</option>
<option value="advanced">Advanced</option>
</select>

<h4>Allowed AI Tools</h4>

<div id="editModes" class="mode-grid">
<label><input type="checkbox" value="simplify"> Simplify</label>
<label><input type="checkbox" value="study_guide"> Study Guide</label>
<label><input type="checkbox" value="quiz"> Quiz</label>
<label><input type="checkbox" value="vocabulary"> Vocabulary</label>
<label><input type="checkbox" value="discussion"> Discussion</label>
<label><input type="checkbox" value="cornell"> Cornell Notes</label>
<label><input type="checkbox" value="summarize"> Summarize</label>
<label><input type="checkbox" value="explain"> Explain</label>
<label><input type="checkbox" value="translate"> Translate</label>
<label><input type="checkbox" value="read"> Read Aloud</label>
</div>

<label class="custom-label">
<input type="checkbox" id="editCustom">
Allow Custom Prompts
</label>

<br><br>

<button onclick="saveEdit()">Save Changes</button>
<button onclick="closeEdit()">Cancel</button>

</div>

<script>

const API = "https://ai-accessibility-extension.onrender.com"

var supabase = window.supabase.createClient(
"https://kjmnjomktavhvhhebvie.supabase.co",
"sb_publishable_oxSfQIHMDwwNdLL2HORWmA_TKvWovFR"
)

// ✅ LOGIN CHECK
async function checkUser(){
const { data } = await supabase.auth.getSession()
if(!data.session){
window.location.href = "login.html"
return
}
}

// ✅ FIXED (this was missing before)
function copyCode(code){
navigator.clipboard.writeText(code)
alert("Copied code: " + code)
}

let editingCode = null
let token = null

async function getToken(){
const { data } = await supabase.auth.getSession()
if(!data.session){
alert("You are not logged in. Please login again.")
window.location.href = "login.html"
return
}
token = data.session?.access_token
}

async function createClass(){
await getToken()
const name = document.getElementById("className").value
const lexile = document.getElementById("lexile").value
const custom = document.getElementById("allowCustom").checked
const modes = []
document.querySelectorAll('.mode-grid input[type="checkbox"]').forEach(cb=>{
if(cb.checked){
modes.push(cb.value)
}
})
const response = await fetch(API + "/create_classroom",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body:JSON.stringify({
class_name:name,
allowed_modes:modes,
locked_lexile:lexile,
allowed_custom:custom
})
})
const data = await response.json()
alert("Classroom Code: " + data.code)
loadClasses()
}

function copyJoinLink(code){
const link =
"https://jackstew77.github.io/ai-accessibility-extension/frontend/join.html?code=" + code
navigator.clipboard.writeText(link)
alert("Join link copied:\n" + link)
}

async function deleteClass(code){
await getToken()
if(!confirm("Delete this classroom?")) return
await fetch(API + "/delete_classroom",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body:JSON.stringify({code:code})
})
loadClasses()
}

function editClass(code){
editingCode = code
fetch(API + "/classrooms",{
headers:{
"Authorization":"Bearer " + token
}
})
.then(res => res.json())
.then(data => {
const classroom = data.find(c => c.code === code)
if(!classroom) return
document.getElementById("editLexile").value = classroom.locked_lexile || ""
document.getElementById("editCustom").checked = classroom.allowed_custom
document.querySelectorAll('#editModes input[type="checkbox"]').forEach(cb=>{
cb.checked = false
})
if(classroom.allowed_modes){
classroom.allowed_modes.forEach(mode => {
const checkbox = document.querySelector(`#editModes input[value="${mode}"]`)
if(checkbox){
checkbox.checked = true
}
})
}
document.getElementById("editModal").style.display = "block"
})
}

function closeEdit(){
document.getElementById("editModal").style.display = "none"
}

async function saveEdit(){
await getToken()
const lexile = document.getElementById("editLexile").value
const custom = document.getElementById("editCustom").checked
const modes = []
document.querySelectorAll('#editModes input[type="checkbox"]').forEach(cb=>{
if(cb.checked){
modes.push(cb.value)
}
})
fetch(API + "/update_classroom",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body:JSON.stringify({
code:editingCode,
allowed_modes:modes,
locked_lexile:lexile,
allowed_custom:custom
})
})
.then(()=>{
alert("Classroom updated")
closeEdit()
loadClasses()
})
}

async function loadClasses(){
await getToken()
const table = document.getElementById("classTable")
table.innerHTML = "<tr><td>Loading classrooms...</td></tr>"
try{
const response = await fetch(API + "/classrooms",{
headers:{
"Authorization":"Bearer " + token
}
})
const data = await response.json()
let html = `
<tr>
<th>Class Name</th>
<th>Code</th>
<th>Locked Lexile</th>
<th>Allowed Custom</th>
<th>Actions</th>
</tr>
`
data.forEach(c => {
html += `
<tr>
<td>${c.class_name ?? "Unnamed"}</td>
<td>${c.code}</td>
<td>${c.locked_lexile ?? "None"}</td>
<td>${c.allowed_custom}</td>
<td>
<button class="small" onclick="copyCode('${c.code}')">Copy Code</button>
<button class="small" onclick="copyJoinLink('${c.code}')">Copy Join Link</button>
<button class="small" onclick="editClass('${c.code}')">Edit</button>
<button class="small delete" onclick="deleteClass('${c.code}')">Delete</button>
</td>
</tr>
`
})
table.innerHTML = html
}catch(err){
console.error("Load classes error:", err)
table.innerHTML = "<tr><td>Failed to load classrooms</td></tr>"
}
}

// ✅ FINAL LOAD FLOW
window.onload = async () => {
await checkUser()
loadClasses()
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Lexic Teacher Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;

/* FIXED: background path */
background: url('./assets/bg.jpg') no-repeat center center/cover;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:0;
}

.glow{
position:absolute;
width:600px;
height:600px;
background: radial-gradient(circle, rgba(44,110,203,0.4), transparent);
filter: blur(120px);
animation: float 8s ease-in-out infinite;
z-index:0;
}

.glow:nth-child(1){ top:-100px; left:-100px; }
.glow:nth-child(2){ bottom:-100px; right:-100px; animation-delay:4s; }

@keyframes float{
0%{transform: translateY(0px);}
50%{transform: translateY(40px);}
100%{transform: translateY(0px);}
}

.login-card{
position:relative;
z-index:1;
background:white;
padding:40px;
border-radius:16px;
width:340px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
text-align:center;
}

.login-card h1{
margin-bottom:10px;
color:#2c6ecb;
}

.subtitle{
color:#666;
margin-bottom:20px;
font-size:14px;
}

.login-card input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

.login-card button{
width:100%;
padding:10px;
margin-top:10px;
background:#2c6ecb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.login-card button:hover{
background:#1f55a5;
}

.google-btn{
background:white;
color:#444;
border:1px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.google-btn:hover{
background:#f5f5f5;
}

.divider{
margin:15px 0;
font-size:12px;
color:#999;
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="login-card">
<h1>Lexic</h1>
<p class="subtitle">AI tools for reading and learning</p>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>

<div class="divider">or</div>

<button class="google-btn" onclick="googleLogin()">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
Sign in with Google
</button>

</div>

<script>

// ✅ ONLY ONE supabase instance (fixes your error)
const supabase = window.supabase.createClient(
"https://kjmnjomktavhvhhebvie.supabase.co",
"sb_publishable_oxSfQIHMDwwNdLL2HORWmA_TKvWovFR"
)

// ✅ LOGIN
async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email,
password
})

if(error){
alert(error.message)
return
}

// wait for session save
setTimeout(() => {
window.location.href = "/ai-accessibility-extension/frontend/dashboard.html"
}, 300)

}

// ✅ SIGN UP (NEW)
async function signup(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { error } = await supabase.auth.signUp({
email,
password
})

if(error){
alert(error.message)
return
}

alert("Account created! You can now log in.")

}

// ✅ GOOGLE LOGIN
async function googleLogin(){

await supabase.auth.signInWithOAuth({
provider: "google",
options: {
redirectTo: "https://jackstew77.github.io/ai-accessibility-extension/frontend/dashboard.html"
}
})

}

</script>

</body>
</html>
